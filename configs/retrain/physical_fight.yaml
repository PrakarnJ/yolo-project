# Class names — must match across ALL batch dataset.yaml files (same order)
classes:
  - fight
  - fall

# Paths (relative to project root)
datasets_dir: datasets/physical_fight        # drop YOLO batch folders here
workspace_dir: workspace_fight      # auto-generated — do not edit by hand

# RF-DETR training (runs after YOLO on the same GPU, same run folder)
rfdetr_train:
  enabled: true
  model: small          # base or large
  epochs: 50
  batch_size: 4
  grad_accum_steps: 4
  lr: 0.0001
  resolution: 560

# YOLO training hyperparameters
train:
  base_model: models/raw_weight/yolo11n.pt
  epochs: 300
  imgsz: 720
  batch: 16
  freeze: 10
  lr0: 0.001
  patience: 20

# Validation settings (applied to ALL models on each retrain)
validate:
  conf: 0.5
  iou: 0.5
  imgsz: 720
  batch: 16
